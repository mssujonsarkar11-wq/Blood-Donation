<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeLink Blood</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
LifeLink Blood
</header>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('donors')">Donors</button>
<button onclick="showPage('requests')">Requests</button>
<button onclick="showPage('post')">Post</button>
<button onclick="showPage('chat')">Chat</button>
<button onclick="showPage('leaderboard')">Top</button>
<button onclick="showPage('hospitals')">Hospitals</button>
<button onclick="showPage('bloodbanks')">Blood Banks</button>
<button onclick="showPage('admin')">Admin</button>
</nav>

<section id="home" class="page">
<h2>Donate Blood Save Life</h2>
<p>Bangladesh Blood Donation Platform</p>
<button onclick="toggleDark()">Dark Mode</button>
</section>

<section id="donors" class="page">
<h2>Donor Registration</h2>

<input id="donorName" placeholder="Name">
<select id="donorBlood">
<option>O+</option>
<option>A+</option>
<option>B+</option>
<option>AB+</option>
</select>

<input id="donorDistrict" placeholder="District">

<button onclick="addDonor()">Register</button>

<h3>Available Donors</h3>
<div id="donorList"></div>

</section>

<section id="requests" class="page">
<h2>Blood Requests</h2>
<div id="requestList"></div>
</section>

<section id="post" class="page">
<h2>Post Blood Request</h2>

<input id="patient" placeholder="Patient Name">
<select id="blood">
<option>O+</option>
<option>A+</option>
<option>B+</option>
<option>AB+</option>
</select>

<input id="hospital" placeholder="Hospital">

<button onclick="postRequest()">Submit</button>

</section>

<section id="chat" class="page">

<h2>Chat</h2>

<div id="messages"></div>

<input id="msg" placeholder="Message">

<button onclick="sendMessage()">Send</button>

</section>

<section id="leaderboard" class="page">

<h2>Top Donors</h2>

<div id="leaderList"></div>

</section>

<section id="hospitals" class="page">

<h2>Hospitals</h2>

<div id="hospitalList"></div>

</section>

<section id="bloodbanks" class="page">

<h2>Blood Banks</h2>

<div id="bloodbankList"></div>

</section>

<section id="admin" class="page">

<h2>Admin Dashboard</h2>

<div id="adminPanel"></div>

</section>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
